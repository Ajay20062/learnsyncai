<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress Tracker - AI Learning Consistency Agent</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="brand">Progress Tracker</div>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="study-plan.html">Study Plan</a>
      <a class="active" href="progress.html">Progress</a>
      <button class="btn" onclick="toggleDarkMode()">Theme</button>
      <button class="btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="card">
    <h3>Mark Daily Tasks</h3>
    <p class="muted">Toggle completion for tasks from your current plan.</p>
    <div id="progressTasks"></div>
    <p id="progressMessage"></p>
  </div>

  <div class="card" style="margin-top:16px;">
    <h3>Reminder Settings</h3>
    <div class="row">
      <div>
        <label>Frequency per week</label>
        <input type="number" id="frequency" min="1" max="14" />
      </div>
    </div>
    <div class="footer-actions">
      <button class="btn primary" onclick="saveReminder()">Save Reminder Frequency</button>
      <button class="btn" onclick="autoAdjustReminder()">Auto Adjust</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/progress.js"></script>
</body>
</html>
