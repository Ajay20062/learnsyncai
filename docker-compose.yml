version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: learnsync-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: learnsyncai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/sample_data.sql:/docker-entrypoint-initdb.d/2-sample.sql

  backend:
    build:
      context: ./backend
    container_name: learnsync-backend
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/learnsyncai?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: change-this-to-a-very-long-random-secret-key-123456789
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: gpt-4o-mini
      OPENAI_API_URL: https://api.openai.com/v1/chat/completions
      CORS_ALLOWED_ORIGIN_PATTERNS: http://localhost:*,null
      REMINDER_CRON: 0 0 20 * * *
    ports:
      - "8080:8080"

volumes:
  mysql_data:
